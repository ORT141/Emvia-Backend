services:
  api:
    build: .
    container_name: ai-survey-api
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./cache:/app/cache
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: ai-survey-nginx
    ports:
      - "8066:8066"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
