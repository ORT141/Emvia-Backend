events {}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    server {

        listen 8066;

        location / {

            limit_req zone=api burst=10;

            proxy_pass http://api:8000;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

        }
    }
}